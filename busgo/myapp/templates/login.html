{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BusGo Cameroon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'assets\fontawesome-free\css\all.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets\bootstrap\css\bootstrap.min.css' %}">
    <link href="{% static 'assets/css/style.css' %}" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="container-fluid h-100">
            <div class="row h-100">
                <!-- Left Side - Image -->
                <div class="col-lg-6 d-none d-lg-block auth-image-section">
                    <div class="auth-image-overlay"></div>
                    <div class="auth-image-content">
                        <h2 class="text-white fw-bold mb-3">Welcome Back to BusGo Cameroon</h2>
                        <p class="text-white-50 lead">Continue your journey with us and explore amazing destinations across Cameroon</p>
                    </div>
                </div>
                
                <!-- Right Side - Form -->
                <div class="col-lg-6 d-flex align-items-center justify-content-center">
                    <div class="auth-form-container">
                        <div class="text-center mb-4">
                            <a href="index.html" class="auth-logo">
                                <i class="fas fa-bus text-primary me-2"></i>
                                <span class="text-primary">Bus</span><span class="text-secondary">Go</span>
                                <small class="text-muted ms-1">Cameroon</small>
                            </a>
                        </div>
                        
                        <div class="auth-card">
                            <div class="text-center mb-4">
                                <h3 class="fw-bold text-dark mb-2">Sign In</h3>
                                <p class="text-muted">Welcome back! Please sign in to your account</p>
                            </div>
                            
                            <form class="auth-form" id="loginForm">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="fas fa-envelope text-muted"></i>
                                        </span>
                                        <input type="email" class="form-control border-start-0" placeholder="Enter your email" required>
                                    </div>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="fas fa-lock text-muted"></i>
                                        </span>
                                        <input type="password" class="form-control border-start-0 border-end-0" placeholder="Enter your password" required>
                                        <span class="input-group-text bg-light border-start-0 cursor-pointer" onclick="togglePassword()">
                                            <i class="fas fa-eye text-muted" id="toggleIcon"></i>
                                        </span>
                                    </div>
                                </div>
                                
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="rememberMe">
                                        <label class="form-check-label text-muted" for="rememberMe">
                                            Remember me
                                        </label>
                                    </div>
                                    <a href="#" class="text-primary text-decoration-none">Forgot Password?</a>
                                </div>
                                
                                <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">
                                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                                </button>
                                
                                <div class="text-center">
                                    <span class="text-muted">Don't have an account? </span>
                                    <a href="register.html" class="text-primary text-decoration-none fw-semibold">Sign Up</a>
                                </div>
                            </form>
                            
                            <div class="divider my-4">
                                <span class="divider-text">Or continue with</span>
                            </div>
                            
                            <div class="social-login">
                                <button class="btn btn-outline-secondary w-100 mb-2">
                                    <i class="fab fa-google text-danger me-2"></i>Continue with Google
                                </button>
                                <button class="btn btn-outline-secondary w-100">
                                    <i class="fab fa-facebook text-primary me-2"></i>Continue with Facebook
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'assets\bootstrap\js\bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'assets/js/main.js' %}"></script>
</body>
</html>
